<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Face Detection UI</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="main-container">
        <header>
            <div class="logo">AI<span>Behavioral</span>Analysis</div>
            <div id="statusBadge" class="status-badge" style="display: none;">
                <span class="dot"></span> LIVE SYSTEM
            </div>
        </header>
        
        <main class="content-area">
            <div class="video-section">
                <div class="video-wrapper">
                    <div id="scanLine" class="scan-line" style="display: none;"></div>
                    <div id="placeholder" class="placeholder-box">
                        <div id="loader" class="loader" style="display: none;"></div>
                        <span id="placeholderText">System Standby - Ready to start</span>
                    </div>
                    <img id="videoFeed" src="" alt="Video Stream" style="display: none;">
                </div>
                <div class="controls">
                    <div class="btn-group">
                        <button id="startBtn" class="btn-start" onclick="startCamera()">Start Analysis</button>
                        <button id="stopBtn" class="btn-stop" onclick="stopCamera()" style="display: none;">Stop Analysis</button>
                    </div>
                    
                    <div class="telemetry-grid">
                        <div class="data-card">
                            <span class="data-label">Blink Count</span>
                            <span id="count" class="data-value">0</span>
                        </div>
                        <div class="data-card">
                            <span class="data-label">Confidence</span>
                            <span class="data-value">98.2%</span>
                        </div>
                        <div class="data-card">
                            <span class="data-label">System</span>
                            <span id="statusText" class="data-value" style="font-size: 0.8rem;">READY</span>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script>
        function startCamera() {
            const videoImg = document.getElementById('videoFeed');
            const placeholderText = document.getElementById('placeholderText');
            const loader = document.getElementById('loader');
            const statusBadge = document.getElementById('statusBadge');
            const startBtn = document.getElementById('startBtn');
            const stopBtn = document.getElementById('stopBtn');
            const statusText = document.getElementById('statusText');
            const scanLine = document.getElementById('scanLine');

            placeholderText.innerText = "Initializing Camera...";
            loader.style.display = "block";
            
            videoImg.onload = () => {
                document.getElementById('placeholder').style.display = "none";
                videoImg.style.display = "block";
                scanLine.style.display = "block";
            };
            
            videoImg.src = "{{ url_for('video') }}";
            statusBadge.style.display = "flex";
            startBtn.style.display = "none";
            stopBtn.style.display = "inline-block";
            statusText.innerText = "LIVE";
        }

        function stopCamera() {
            location.reload(); // Simplest way to cleanly reset the stream and backend camera
        }

        function updateBlinkCount() {
            fetch('/blink_count')
                .then(response => response.json())
                .then(data => {
                    document.getElementById('count').textContent = data.count;
                })
                .catch(error => console.error('Error fetching blink count:', error));
        }
        
        setInterval(updateBlinkCount, 1000);
        updateBlinkCount(); // Initial load
    </script>
</body>
</html>
