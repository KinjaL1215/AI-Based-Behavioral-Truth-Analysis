<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Face Detection UI</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="main-container">
        <header>
            <div class="logo">AI<span>Behavioral</span>Analysis</div>
            <div id="statusBadge" class="status-badge" style="display: none;">
                <span class="dot"></span> LIVE SYSTEM
            </div>
        </header>
        
        <main class="content-area">
            <div class="video-section">
                <div class="video-wrapper">
                    <div id="scanLine" class="scan-line" style="display: none;"></div>
                    <div id="placeholder" class="placeholder-box">
                        <div id="loader" class="loader" style="display: none;"></div>
                        <span id="placeholderText">System Standby - Ready to start</span>
                    </div>
                    <img id="videoFeed" src="" alt="Video Stream" style="display: none;">
                </div>
                <div class="controls">
                    <div class="btn-group">
                        <button id="startBtn" class="btn-start" onclick="startCamera()">Start Analysis</button>
                        <button id="stopBtn" class="btn-stop" onclick="stopCamera()" style="display: none;">Stop Analysis</button>
                        <button id="resetBtn" class="btn-start" onclick="location.reload()" style="display: none; background-color: #f44336;">Fresh Restart</button>
                    </div>
                    
                    <div class="telemetry-grid">
                        <div class="data-card">
                            <span class="data-label">Blink Count</span>
                            <span id="count" class="data-value">0</span>
                        </div>
                        <div class="data-card">
                            <span class="data-label">Voice Result</span>
                            <span id="voiceResult" class="data-value">Not Analyzed</span>
                        </div>
                        <div class="data-card">
                            <span class="data-label">System</span>
                            <span id="statusText" class="data-value" style="font-size: 0.8rem;">READY</span>
                        </div>
                    </div>
                    
                    <div id="voiceDetails" class="voice-details" style="display: none;">
                        <div class="detail-item">
                            <span class="detail-label">Pitch:</span>
                            <span id="voicePitch" class="detail-value"></span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">Energy:</span>
                            <span id="voiceEnergy" class="detail-value"></span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">Tempo:</span>
                            <span id="voiceTempo" class="detail-value"></span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">Score:</span>
                            <span id="voiceScore" class="detail-value"></span>
                        </div>
                    </div>
                    
                    <div id="finalResults" class="final-results" style="display: none;">
                        <h3>Analysis Complete</h3>
                        <div class="result-item">
                            <span class="result-label">Final Blink Count:</span>
                            <span id="finalBlinkCount" class="result-value"></span>
                        </div>
                        <div class="result-item">
                            <span class="result-label">Voice Analysis Result:</span>
                            <span id="finalVoiceResult" class="result-value"></span>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script>
        function startCamera() {
            const videoImg = document.getElementById('videoFeed');
            const placeholderText = document.getElementById('placeholderText');
            const loader = document.getElementById('loader');
            const statusBadge = document.getElementById('statusBadge');
            const startBtn = document.getElementById('startBtn');
            const stopBtn = document.getElementById('stopBtn');
            const statusText = document.getElementById('statusText');
            const scanLine = document.getElementById('scanLine');
            const finalResults = document.getElementById('finalResults');

            placeholderText.innerText = "Initializing Camera...";
            loader.style.display = "block";
            finalResults.style.display = "none"; // Hide previous results
            
            videoImg.onload = () => {
                document.getElementById('placeholder').style.display = "none";
                videoImg.style.display = "block";
                scanLine.style.display = "block";
                // Start blink count updates
                if (!updateInterval) {
                    updateInterval = setInterval(updateBlinkCount, 1000);
                }
            };
            
            videoImg.src = "{{ url_for('video') }}";
            statusBadge.style.display = "flex";
            startBtn.style.display = "none";
            stopBtn.style.display = "inline-block";
            statusText.innerText = "LIVE";
            
            isAnalysisActive = true;
            startVoiceAnalysis();
        }

        function stopCamera() {
            // Stop analysis and show final results
            const videoImg = document.getElementById('videoFeed');
            const placeholder = document.getElementById('placeholder');
            const placeholderText = document.getElementById('placeholderText');
            const loader = document.getElementById('loader');
            const scanLine = document.getElementById('scanLine');
            const statusBadge = document.getElementById('statusBadge');
            const startBtn = document.getElementById('startBtn');
            const stopBtn = document.getElementById('stopBtn');
            const finalResults = document.getElementById('finalResults');
            const statusText = document.getElementById('statusText');

            // Stop updates
            if (updateInterval) {
                clearInterval(updateInterval);
                updateInterval = null;
            }

            // Hide video elements
            videoImg.style.display = "none";
            scanLine.style.display = "none";
            placeholder.style.display = "block";
            placeholderText.innerText = "Analysis Stopped";
            loader.style.display = "none";

            // Basic final state
            statusBadge.style.display = "none";
            startBtn.style.display = "none";
            document.getElementById('resetBtn').style.display = "inline-block";
            stopBtn.style.display = "none";
            statusText.innerText = "STOPPED";
            
            isAnalysisActive = false;

            // Final blink count summary
            const finalBlink = document.getElementById('count').textContent;
            document.getElementById('finalBlinkCount').textContent = finalBlink;
            finalResults.style.display = "block";
        }

        function updateBlinkCount() {
            fetch('/blink_count')
                .then(response => response.json())
                .then(data => {
                    document.getElementById('count').textContent = data.count;
                })
                .catch(error => console.error('Error fetching blink count:', error));
        }
        
        var latestVoiceData = null;
        var voiceInProgress = false;
        var isAnalysisActive = false;

        function startVoiceAnalysis() {
            if (voiceInProgress || !isAnalysisActive) {
                return;
            }
            voiceInProgress = true;

            const resultEl = document.getElementById('voiceResult');
            const detailsEl = document.getElementById('voiceDetails');
            const finalVoiceElement = document.getElementById('finalVoiceResult');

            resultEl.textContent = 'Analyzing...';
            finalVoiceElement.textContent = 'Analyzing...';
            detailsEl.style.display = 'none';

            fetch('/voice_analysis')
                .then(response => response.json())
                .then(data => {
                    if (data.error) {
                        latestVoiceData = null;
                        resultEl.textContent = 'Error';
                        finalVoiceElement.textContent = 'Error';
                        console.error('Voice analysis error:', data.error);
                    } else {
                        latestVoiceData = data;
                        resultEl.textContent = data.result;
                        finalVoiceElement.textContent = data.result;
                        document.getElementById('voicePitch').textContent = data.pitch + ' Hz';
                        document.getElementById('voiceEnergy').textContent = data.energy;
                        document.getElementById('voiceTempo').textContent = data.tempo + ' BPM';
                        document.getElementById('voiceScore').textContent = data.score;
                        detailsEl.style.display = 'block';
                    }
                })
                .catch(error => {
                    latestVoiceData = null;
                    console.error('Error fetching voice analysis:', error);
                    resultEl.textContent = 'Error';
                    finalVoiceElement.textContent = 'Error';
                })
                .finally(() => {
                    voiceInProgress = false;
                    if (isAnalysisActive) {
                        startVoiceAnalysis(); // Continue looping
                    }
                });
        }

        var updateInterval = null;
        updateBlinkCount(); // Initial load
    </script>
</body>
</html>
