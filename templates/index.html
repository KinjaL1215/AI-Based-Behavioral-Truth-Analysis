<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Face Detection UI</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="main-container">
        <header>
            <div class="logo">AI<span>Behavioral</span>Analysis</div>
            <div id="statusBadge" class="status-badge" style="display: none;">
                <span class="dot"></span> LIVE SYSTEM
            </div>
        </header>
        
        <main class="content-area">
            <div class="video-section">
                <div class="video-wrapper">
                    <div id="scanLine" class="scan-line" style="display: none;"></div>
                    <div id="placeholder" class="placeholder-box">
                        <div id="loader" class="loader" style="display: none;"></div>
                        <span id="placeholderText">System Standby - Ready to start</span>
                    </div>
                    <img id="videoFeed" src="" alt="Video Stream" style="display: none;">
                </div>
                <div class="controls">
                    <div class="btn-group">
    <!-- Step 1: Calibration -->
    <button id="calibrateBtn" class="btn-start" onclick="startCalibration()" style="background-color: #2196F3;">1. Calibrate (Speak Normally)</button>
    
    <!-- Step 2: Analysis (Hidden until Calibrated) -->
    <button id="startBtn" class="btn-start" onclick="startCamera()" style="display: none; background-color: #4CAF50;">2. Start Interrogation</button>
    
    <button id="stopBtn" class="btn-stop" onclick="stopCamera()" style="display: none;">Stop Analysis</button>
    <button id="resetBtn" class="btn-start" onclick="location.reload()" style="display: none; background-color: #f44336;">Fresh Restart</button>
</div>
                    
                    <div class="telemetry-grid">
                        <div class="data-card">
                            <span class="data-label">Blink Count</span>
                            <span id="count" class="data-value">0</span>
                        </div>
                        <div class="data-card">
                            <span class="data-label">Voice Result</span>
                            <span id="voiceResult" class="data-value">Not Analyzed</span>
                        </div>
                        <div class="data-card">
                            <span class="data-label">System</span>
                            <span id="statusText" class="data-value" style="font-size: 0.8rem;">READY</span>
                        </div>
                    </div>
                    
                    <div id="voiceDetails" class="voice-details" style="display: none;">
                        <div class="detail-item">
                            <span class="detail-label">Pitch:</span>
                            <span id="voicePitch" class="detail-value"></span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">Energy:</span>
                            <span id="voiceEnergy" class="detail-value"></span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">Tempo:</span>
                            <span id="voiceTempo" class="detail-value"></span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">Score:</span>
                            <span id="voiceScore" class="detail-value"></span>
                        </div>
                    </div>
                    
                    <div id="finalResults" class="final-results" style="display: none;">
                        <h3>Analysis Complete</h3>
                        <div class="result-item">
                            <span class="result-label">Final Blink Count:</span>
                            <span id="finalBlinkCount" class="result-value"></span>
                        </div>
                        <div class="result-item">
                            <span class="result-label">Voice Analysis Result:</span>
                            <span id="finalVoiceResult" class="result-value"></span>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
   <script>
        let updateInterval = null;
        let isAnalysisActive = false;
        let latestVoiceData = null;

        // --- STEP 1: CALIBRATION ---
        function startCalibration() {
            const statusText = document.getElementById('statusText');
            const calibrateBtn = document.getElementById('calibrateBtn');
            const startBtn = document.getElementById('startBtn');

            statusText.innerText = "CALIBRATING VOICE...";
            calibrateBtn.disabled = true;
            calibrateBtn.innerText = "Recording Baseline (3s)...";

            // Calls the calibration route in app.py
            fetch('/calibrate_voice')
                .then(response => response.json())
                .then(data => {
                    if (data.status === 'Voice Calibrated') {
                        statusText.innerText = "CALIBRATED";
                        calibrateBtn.style.display = "none";
                        startBtn.style.display = "inline-block"; // Show the real analysis button
                        alert("Voice Profile Saved! Now click 'Start Interrogation'.");
                    } else {
                        alert("Calibration failed. Check Microphone.");
                        calibrateBtn.disabled = false;
                        calibrateBtn.innerText = "Retry Calibration";
                    }
                })
                .catch(err => {
                    console.error(err);
                    statusText.innerText = "MIC ERROR";
                });
        }

        // --- STEP 2: VIDEO ANALYSIS ---
        function startCamera() {
            const videoImg = document.getElementById('videoFeed');
            const placeholderText = document.getElementById('placeholderText');
            const loader = document.getElementById('loader');
            const statusBadge = document.getElementById('statusBadge');
            const startBtn = document.getElementById('startBtn');
            const stopBtn = document.getElementById('stopBtn');
            const statusText = document.getElementById('statusText');
            const scanLine = document.getElementById('scanLine');

            placeholderText.innerText = "Initializing Camera...";
            loader.style.display = "block";
            
            videoImg.onload = () => {
                document.getElementById('placeholder').style.display = "none";
                videoImg.style.display = "block";
                scanLine.style.display = "block";
                if (!updateInterval) {
                    updateInterval = setInterval(updateBlinkCount, 1000);
                }
            };
            
            videoImg.src = "{{ url_for('video') }}";
            statusBadge.style.display = "flex";
            startBtn.style.display = "none";
            stopBtn.style.display = "inline-block";
            statusText.innerText = "ANALYZING";
            
            isAnalysisActive = true;
            
            // Start the infinite voice analysis loop
            triggerVoiceInterrogation();
        }

        // --- STEP 3: VOICE ANALYSIS LOOP ---
        function triggerVoiceInterrogation() {
            if (!isAnalysisActive) return;

            const voiceResult = document.getElementById('voiceResult');
            const voiceDetails = document.getElementById('voiceDetails');
            voiceResult.innerText = "Listening...";
            voiceDetails.style.display = "block";

            fetch('/voice_analysis')
                .then(response => response.json())
                .then(data => {
                    // Update UI with results
                    document.getElementById('voicePitch').innerText = data.pitch + " Hz";
                    document.getElementById('voiceEnergy').innerText = data.energy;
                    document.getElementById('voiceTempo').innerText = data.tempo + " BPM";
                    document.getElementById('voiceScore').innerText = data.total_score + "% Stress";
                    document.getElementById('voiceResult').innerText = data.result;
                    
                    // Change text color based on result
                    voiceResult.style.color = (data.result === "POSSIBLE LIE") ? "red" : "#4CAF50";

                    // Restart analysis after a small delay
                    if (isAnalysisActive) {
                        setTimeout(triggerVoiceInterrogation, 1500);
                    }
                })
                .catch(error => {
                    console.error('Voice Error:', error);
                    voiceResult.innerText = "Mic Error";
                });
        }

        function updateBlinkCount() {
            fetch('/blink_count')
                .then(response => response.json())
                .then(data => {
                    document.getElementById('count').textContent = data.count;
                })
                .catch(error => console.error('Error fetching blink count:', error));
        }

        function stopCamera() {
            isAnalysisActive = false;
            if (updateInterval) clearInterval(updateInterval);
            location.reload(); // Reset everything for the next session
        }
    </script>
</body>
</html>
