[phases.setup]
nixPkgs = [
  "mesa",         # Provides libGL.so.1 for OpenCV
  "glib",
  "libstdc++",
  "zlib",
  "ffmpeg"        # Required for librosa audio
]

[phases.install]
cmds = [
  "python3 -m pip install --upgrade pip",
  "pip install --no-cache-dir -r requirements.txt"
]

[phases.start]
cmd = "gunicorn app:app --bind 0.0.0.0:$PORT"