[phases.setup]
nixPkgs = [
  "...",           # IMPORTANT: Keeps default Python/system tools
  "mesa",          # Provides libGL.so.1
  "glib",
  "libstdcxx",     # Note: use 'libstdcxx' instead of 'libstdc++' for Nix
  "zlib",
  "ffmpeg"         
]

[phases.install]
cmds = [
  "python3 -m pip install --upgrade pip",
  "pip install --no-cache-dir -r requirements.txt"
]

[phases.start]
cmd = "gunicorn app:app --bind 0.0.0.0:$PORT"
